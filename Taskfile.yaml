version: 3

tasks:
  # --------------------------- SETUP ------------------------------------

  activate:
    desc: Activates the virtual environment in development mode
    cmds:
      - hatch shell

  clean_ruff:
    desc: "Remove all .ruff_cache directories"
    cmds:
      - |
        find . \
          -type d \
          -name ".ruff_cache" \
          -exec rm -rf {} +

  clean_mypy:
    desc: "Remove all .mypy_cache directories"
    cmds:
      - |
        find . \
          -type d \
          -name ".mypy_cache" \
          -exec rm -rf {} +

  clean_pytest:
    desc: "Remove all .pytest_cache directories"
    cmds:
      - |
        find . \
          -type d \
          -name ".pytest_cache" \
          -exec rm -rf {} +

  clean:
    desc: Cleans caching, pyc and pycache files
    cmds:
      - hatch run clean_pyc
      - hatch run clean_pycache
      - task clean_ruff
      - task clean_mypy
      - task clean_pytest

  build_with_checks:
    desc: Builds the project with checks
    cmds:
      - hatch run build_with_check

  lint:
    desc: Lints the project
    cmds:
      - hatch run lint

  mypy:
    desc: Runs the type checker only, no formatting
    cmds:
      - hatch run test:check_types

  format:
    desc: Formats the code with isort and black
    cmds:
      - task lint
      - task mypy
  #---------------------------- DOCS -------------------------------

  serve:
    desc: Runs the documentation in live mode
    cmds:
      - hatch run docs:serve

  docs_prepare:
    desc: Generates build-ready docs markdown (expands include directives)
    cmds:
      - hatch run docs:prepare

  docs_build:
    desc: Builds the documentation site with Zensical
    cmds:
      - hatch run docs:build

  docs_clean:
    desc: Cleans generated docs and docs build cache
    cmds:
      - hatch run docs:clean

  dashboard:
    desc: Run BE for admin
    cmds:
      - cd edgy/contrib/admin && python -m serve

  # --------------------------- TEST ------------------------------------

  test:
    desc: Runs the suite tests
    env:
      RAVYN_SETTINGS_MODULE: tests.settings.TestSettings
    cmds:
      - hatch run test:test {{ .ARGS }}

  test_man:
    desc: Runs the manual tests with more output details and python breakpoints allowed
    env:
      RAVYN_SETTINGS_MODULE: tests.settings.TestSettings
    cmds:
      - hatch run test:test_man {{ .ARGS }}

  test_parallel:
    desc: Runs parallel-safe tests with pytest-xdist
    env:
      RAVYN_SETTINGS_MODULE: tests.settings.TestSettings
    cmds:
      - hatch run test:test -n auto --dist=loadscope -m "not serial" {{ .ARGS }}

  test_serial:
    desc: Runs tests marked as serial
    env:
      RAVYN_SETTINGS_MODULE: tests.settings.TestSettings
    cmds:
      - hatch run test:test -n 0 -m "serial" {{ .ARGS }}

  test_split_validate:
    desc: Validates serial/non-serial split covers the full suite once
    env:
      RAVYN_SETTINGS_MODULE: tests.settings.TestSettings
    cmds:
      - hatch run test:python scripts/validate_pytest_split.py

  test_ci:
    desc: Runs split suite (parallel-safe + serial)
    env:
      RAVYN_SETTINGS_MODULE: tests.settings.TestSettings
    cmds:
      - task test_split_validate
      - task test_parallel
      - task test_serial

  coverage:
    desc: Runs the coverage tests
    env:
      RAVYN_SETTINGS_MODULE: tests.settings.TestSettings
    cmds:
      - hatch run test:coverage {{ .ARGS }}
