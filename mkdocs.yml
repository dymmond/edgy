site_name: Edgy
site_description: 🔥 The perfect ORM to work with complex databases 🔥.
site_url: https://edgy.dymmond.com
docs_dir: docs-generated
site_dir: site
theme:
  name: "material"
  custom_dir: docs-generated/overrides
  language: en
  palette:
    - scheme: "default"
      primary: "pink"
      accent: "red"
      media: "(prefers-color-scheme: light)"
      toggle:
        icon: "material/lightbulb"
        name: "Switch to dark mode"
    - scheme: "slate"
      media: "(prefers-color-scheme: dark)"
      primary: "pink"
      accent: "red"
      toggle:
        icon: "material/lightbulb-outline"
        name: "Switch to light mode"
  favicon: statics/images/favicon.ico
  logo: statics/images/white.png
  features:
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - content.code.select
    - navigation.indexes
    - navigation.path

repo_name: dymmond/edgy
repo_url: https://github.com/dymmond/edgy
edit_uri: ""
extra_css:
  - stylesheets/extra.css
plugins:
  - search
  - meta-descriptions:
      export_csv: false
      quiet: false
      enable_checks: false
      min_length: 50
      max_length: 160
      trim: false
  - mkdocstrings:
      handlers:
        python:
          options:
            extensions:
              - griffe_typingdoc
            show_root_heading: true
            show_if_no_docstring: true
            preload_modules: [databasez]
            inherited_members: true
            members_order: source
            separate_signature: true
            unwrap_annotated: true
            filters: ["!^_"]
            merge_init_into_class: true
            docstring_section_style: spacy
            signature_crossrefs: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true

nav:
  - Edgy: "index.md"
  - Getting Started:
      - "getting-started/index.md"
      - Install and First Query: "getting-started/install-and-first-query.md"
      - First Migration Cycle: "getting-started/first-migration-cycle.md"
  - Concepts:
      - Architecture Overview: "concepts/architecture.md"
      - Request and Query Lifecycle: "concepts/request-lifecycle.md"
      - Component Interactions: "concepts/component-interactions.md"
  - Tutorials:
      - "tutorials/index.md"
      - Build a Ravyn API with Edgy: "tutorials/build-a-ravyn-api.md"
      - Multi-Database and Schema Workflow: "tutorials/multi-db-and-schema-workflow.md"
  - How-To Guides:
      - "guides/index.md"
      - Developer Workflow: "guides/developer-workflow-local-dev-test-debug.md"
  - Core:
      - Connection: "connection.md"
      - Models: "models.md"
      - Declarative Models: "declarative-models.md"
      - Reflection:
          - Reflection: "reflection/reflection.md"
          - Automatic Reflection: "reflection/autoreflection.md"
      - Embedding: "embedding.md"
      - Managers: "managers.md"
      - Fields:
          - "fields/index.md"
