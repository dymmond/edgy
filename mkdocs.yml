markdown_extensions:
  - attr_list
  - toc:
      permalink: true
  - admonition
  - abbr
  - def_list
  - footnotes
  - pymdownx.superfences:
      custom_fences:
      - name: mermaid
        class: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - md_in_html

extra:
  alternate:
    - link: /
      name: English
      lang: en
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/dymmond/edgy
    - icon: fontawesome/brands/discord
      link: https://discord.gg/XVeWXSrJ
